<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>Nestoria — Stays for the quietly curious</title>
    <meta name="description" content="A boutique-hotel booking platform for independent Indian stays — restored havelis, beach houses, plantation bungalows. Search, book, host, review." />
    <meta property="og:title" content="Nestoria — Stays for the quietly curious" />
    <meta property="og:description" content="Hand-picked houses, lodges and retreats across India — chosen for the kind of details that make a stay actually memorable." />
    <meta property="og:type" content="website" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <!-- Anti-FOUC theme bootstrap -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('nestoria-theme');
          if (!saved) saved = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          document.documentElement.setAttribute('data-theme', saved);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
