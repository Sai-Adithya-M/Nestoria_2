server {
    listen 80;
    server_name _;  # Replace with your domain or EC2 public IP

    # Serve the React frontend (static build)
    root /home/ubuntu/Nestoria_2/frontend/build;
    index index.html;

    # Frontend — all non-API routes serve index.html (SPA routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend — proxy /api/* to Express
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;

    # Upload limit (for hotel images)
    client_max_body_size 10M;
}
